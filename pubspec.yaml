name: fudo_challenge
description: "FUDO Flutter Challenge"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  dio: ^5.0.0
  logger: ^2.6.0  # for logging purpose
  json_annotation: ^4.9.0
  cupertino_icons: ^1.0.8
  injectable: ^2.5.0
  get_it: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.6.0
  json_serializable: ^6.10.0
  flutter_lints: ^6.0.0
  injectable_generator: ^2.6.0

flutter:
  uses-material-design: true
  generate: true